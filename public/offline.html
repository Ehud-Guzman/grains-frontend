<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Vittorios Grains & Cereals</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #FAF7F2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #3D3020;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(139, 94, 24, 0.12);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { color: #8B7355; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .phone {
      display: inline-flex; align-items: center; gap: 8px;
      background: #C8912A; color: white;
      padding: 12px 28px; border-radius: 12px;
      font-weight: 600; font-size: 15px;
      text-decoration: none;
    }
    .retry {
      display: block; margin-top: 14px;
      color: #C8912A; font-size: 14px;
      cursor: pointer; text-decoration: underline;
      background: none; border: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌾</div>
    <h1>You're offline</h1>
    <p>
      It looks like you've lost your connection.
      Some pages may still be available from your last visit.
    </p>
    <a href="tel:+254799031449" class="phone">📞 Call Us to Order</a>
    <button class="retry" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
